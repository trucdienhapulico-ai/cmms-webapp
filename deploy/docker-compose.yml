version: "3.9"

services:
  # ─── Stable (Production) ─────────────────────────────────────
  cmms-stable:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: cmms-stable
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3090
    env_file:
      - ../env/stable.env
    volumes:
      - stable-data:/app/data
    networks:
      - cmms-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Test ─────────────────────────────────────────────────────
  cmms-test:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: cmms-test
    restart: unless-stopped
    environment:
      - NODE_ENV=test
      - PORT=3090
    env_file:
      - ../env/test.env
    volumes:
      - test-data:/app/data
    networks:
      - cmms-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cmms-nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - cmms-net
    depends_on:
      - cmms-stable
      - cmms-test

  # ─── Cloudflare Tunnel (Optional for Public HTTPS) ─────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cmms-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=YOUR_CLOUDFLARE_TUNNEL_TOKEN_HERE
    networks:
      - cmms-net

volumes:
  stable-data:
    name: cmms-stable-data
  test-data:
    name: cmms-test-data

networks:
  cmms-net:
    driver: bridge
