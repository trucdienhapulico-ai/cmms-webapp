version: "3.9"

services:
  # ─── Stable (Production) ─────────────────────────────────────
  cmms-stable:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: cmms-stable
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3090
    env_file:
      - ../env/stable.env
    volumes:
      - stable-data:/app/data
    networks:
      - cmms-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Test ─────────────────────────────────────────────────────
  cmms-test:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: cmms-test
    restart: unless-stopped
    environment:
      - NODE_ENV=test
      - PORT=3090
    env_file:
      - ../env/test.env
    volumes:
      - test-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/local/bin/docker:/usr/bin/docker
      - /usr/local/bin/docker-compose:/usr/bin/docker-compose
    networks:
      - cmms-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cmms-nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - cmms-net
    depends_on:
      - cmms-stable
      - cmms-test

  # ─── Cloudflare Tunnel (Optional for Public HTTPS) ─────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cmms-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - cmms-net

  # ─── Database (PostgreSQL) ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cmms-postgres
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - POSTGRES_DB=${DB_NAME:-cmms_prod}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cmms-net

  # ─── DB Management (Adminer) ──────────────────────────────────
  adminer:
    image: adminer
    container_name: cmms-adminer
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "8082:8080"
    networks:
      - cmms-net
    depends_on:
      - postgres

volumes:
  stable-data:
    name: cmms-stable-data
  test-data:
    name: cmms-test-data
  postgres-data:
    name: cmms-postgres-data

networks:
  cmms-net:
    driver: bridge
